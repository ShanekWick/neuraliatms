apes  */\n  --color-oracle-white: #F6EFF3;   /* warm off-white surface, page background      */\n\n  /* ---------- Tonal scales (derived; use sparingly, prefer brand colors) ----- */\n  --violet-50:  #EFEDF0;\n  --violet-100: #DAD5DD;\n  --violet-200: #B5ACBC;\n  --violet-300: #8F829A;\n  --violet-400: #6F6378;\n  --violet-500: #5A5064;          /* deep violet */\n  --violet-600: #463E4F;\n  --violet-700: #322C39;\n  --violet-800: #211D26;\n  --violet-900: #131115;\n\n  --purple-50:  #F4ECF0;\n  --purple-100: #E5D2DC;\n  --purple-200: #CFA9BD;\n  --purple-300: #B98AA6;\n  --purple-400: #A0728F;          /* mind purple */\n  --purple-500: #8A5E7A;\n  --purple-600: #6E4B61;\n  --purple-700: #523847;\n\n  --grey-50:  #ECEDEF;\n  --grey-100: #D4D6DB;\n  --grey-200: #A8ADB6;\n  --grey-300: #7C8392;\n  --grey-400: #5C6470;\n  --grey-500: #474E5B;            /* calm grey */\n  --grey-600: #383E48;\n  --grey-700: #292E35;\n\n  /* ---------- Semantic surfaces & foreground -------------------------------- */\n  --bg-page:        var(--color-oracle-white);\n  --bg-surface:     #FFFFFF;\n  --bg-elevated:    #FFFFFF;\n  --bg-violet:      var(--color-deep-violet);   /* full-bleed brand sections */\n  --bg-mauve-soft:  #EADBE3;                    /* tonal section background  */\n  --bg-mauve:       var(--color-mind-purple);\n\n  --fg-primary:     var(--color-deep-violet);   /* default body text */\n  --fg-secondary:   var(--color-calm-grey);     /* meta, lead-ins    */\n  --fg-muted:       #7A7280;                    /* helper text       */\n  --fg-on-violet:   var(--color-oracle-white);  /* text on dark BGs  */\n  --fg-on-mauve:    #FFFFFF;\n  --fg-accent:      var(--color-mind-purple);   /* link / accent     */\n\n  --border-subtle:  rgba(90, 80, 100, 0.12);\n  --border-default: rgba(90, 80, 100, 0.20);\n  --border-strong:  rgba(90, 80, 100, 0.40);\n  --border-on-dark: rgba(255, 255, 255, 0.18);\n\n  /* ---------- Status (used sparingly — clinical context) -------------------- */\n  --status-success: #4F8C6E;       /* muted sage, never bright green */\n  --status-warning: #C99860;       /* warm sand */\n  --status-danger:  #B5556B;       /* dusty rose */\n  --status-info:    var(--color-mind-purple);\n\n  /* ---------- Type families ------------------------------------------------- */\n  --font-sans:    'Josefin Sans', ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif;\n  --font-script:  'La Belle Aurore', 'Caveat', cursive;       /* highlights only */\n  --font-mono:    'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;\n\n  /* ---------- Type scale ---------------------------------------------------- */\n  /* Josefin Sans is geometric & open — runs ~5–8 % larger optically than Inter,\n     so set generous letter-spacing on small caps and tighten display sizes.   */\n  --fs-display-xl: clamp(3.5rem, 6vw, 5.5rem);   /* hero headlines        88px */\n  --fs-display:    clamp(2.75rem, 4.5vw, 4rem);  /*                       64px */\n  --fs-h1:         clamp(2.25rem, 3.2vw, 3rem);  /*                       48px */\n  --fs-h2:         clamp(1.75rem, 2.4vw, 2.25rem);/*                      36px */\n  --fs-h3:         1.5rem;                       /*                       24px */\n  --fs-h4:         1.25rem;                      /*                       20px */\n  --fs-body-lg:    1.125rem;                     /*                       18px */\n  --fs-body:       1rem;                         /*                       16px */\n  --fs-body-sm:    0.9375rem;                    /*                       15px */\n  --fs-caption:    0.8125rem;                    /*                       13px */\n  --fs-overline:   0.75rem;                      /*                       12px */\n\n  --lh-tight:      1.08;\n  --lh-snug:       1.2;\n  --lh-normal:     1.5;\n  --lh-relaxed:    1.65;\n\n  --ls-tight:      -0.01em;\n  --ls-normal:     0;\n  --ls-wide:       0.04em;\n  --ls-overline:   0.14em;\n\n  --fw-light:      300;\n  --fw-regular:    400;\n  --fw-medium:     500;\n  --fw-semibold:   600;\n  --fw-bold:       700;\n\n  /* ---------- Spacing scale (4 px base) ------------------------------------ */\n  --space-0:  0;\n  --space-1:  0.25rem;   /*  4 */\n  --space-2:  0.5rem;    /*  8 */\n  --space-3:  0.75rem;   /* 12 */\n  --space-4:  1rem;      /* 16 */\n  --space-5:  1.5rem;    /* 24 */\n  --space-6:  2rem;      /* 32 */\n  --space-7:  2.5rem;    /* 40 */\n  --space-8:  3rem;      /* 48 */\n  --space-9:  4rem;      /* 64 */\n  --space-10: 6rem;      /* 96 */\n  --space-11: 8rem;      /* 128 */\n\n  /* ---------- Radii — generously rounded, soft & medical ------------------- */\n  --radius-xs:    4px;\n  --radius-sm:    8px;\n  --radius-md:    14px;\n  --radius-lg:    20px;\n  --radius-xl:    28px;\n  --radius-2xl:   36px;\n  --radius-pill:  999px;\n\n  /* ---------- Shadows — diffuse, warm-violet tint, never grey -------------- */\n  --shadow-xs:  0 1px 2px rgba(90, 80, 100, 0.06);\n  --shadow-sm:  0 2px 6px rgba(90, 80, 100, 0.08);\n  --shadow-md:  0 8px 20px rgba(90, 80, 100, 0.10);\n  --shadow-lg:  0 18px 40px rgba(90, 80, 100, 0.14);\n  --shadow-xl:  0 28px 64px rgba(90, 80, 100, 0.18);\n  --shadow-inset-soft: inset 0 1px 0 rgba(255, 255, 255, 0.5);\n\n  /* ---------- Motion -------------------------------------------------------- */\n  --ease-out:      cubic-bezier(0.22, 0.61, 0.36, 1);\n  --ease-in-out:   cubic-bezier(0.65, 0, 0.35, 1);\n  --duration-fast: 140ms;\n  --duration-base: 220ms;\n  --duration-slow: 420ms;\n\n  /* ---------- Container ----------------------------------------------------- */\n  --container-narrow: 760px;\n  --container-base:   1080px;\n  --container-wide:   1280px;\n}\n\n/* =============================================================================\n   Semantic element styles — opt in by wrapping content in `.neuralia` or by\n   importing this file at the top of a stylesheet.\n   ============================================================================= */\n\n.neuralia,\n.neuralia * {\n  -webkit-font-smoothing: antialiased;\n  -moz-osx-font-smoothing: grayscale;\n}\n\n.neuralia {\n  font-family: var(--font-sans);\n  font-size: var(--fs-body);\n  line-height: var(--lh-relaxed);\n  color: var(--fg-primary);\n  background: var(--bg-page);\n  font-weight: var(--fw-regular);\n}\n\n.neuralia h1, .neuralia .h1 {\n  font-family: var(--font-sans);\n  font-size: var(--fs-h1);\n  font-weight: var(--fw-bold);\n  line-height: var(--lh-tight);\n  letter-spacing: var(--ls-tight);\n  color: var(--fg-primary);\n  margin: 0 0 var(--space-4);\n}\n.neuralia h2, .neuralia .h2 {\n  font-family: var(--font-sans);\n  font-size: var(--fs-h2);\n  font-weight: var(--fw-bold);\n  line-height: var(--lh-snug);\n  letter-spacing: var(--ls-tight);\n  color: var(--fg-primary);\n  margin: 0 0 var(--space-4);\n}\n.neuralia h3, .neuralia .h3 {\n  font-family: var(--font-sans);\n  font-size: var(--fs-h3);\n  font-weight: var(--fw-bold);\n  line-height: var(--lh-snug);\n  color: var(--fg-primary);\n  margin: 0 0 var(--space-3);\n}\n.neuralia h4, .neuralia .h4 {\n  font-family: var(--font-sans);\n  font-size: var(--fs-h4);\n  font-weight: var(--fw-semibold);\n  line-height: var(--lh-snug);\n  color: var(--fg-primary);\n  margin: 0 0 var(--space-2);\n}\n\n.neuralia .display {\n  font-family: var(--font-sans);\n  font-size: var(--fs-display);\n  font-weight: var(--fw-bold);\n  line-height: var(--lh-tight);\n  letter-spacing: var(--ls-tight);\n}\n.neuralia .display-xl {\n  font-family: var(--font-sans);\n  font-size: var(--fs-display-xl);\n  font-weight: var(--fw-bold);\n  line-height: var(--lh-tight);\n  letter-spacing: var(--ls-tight);\n}\n\n.neuralia .script-highlight {\n  /* Hand-written script callout — short phrases only, 1 per screen max */\n  font-family: var(--font-script);\n  font-weight: var(--fw-regular);\n  font-size: 1.35em;\n  line-height: 1;\n  color: var(--color-mind-purple);\n}\n\n.neuralia p, .neuralia .body {\n  font-size: var(--fs-body);\n  line-height: var(--lh-relaxed);\n  color: var(--fg-secondary);\n  margin: 0 0 var(--space-4);\n  max-width: 64ch;\n  text-wrap: pretty;\n}\n.neuralia .lead {\n  font-size: var(--fs-body-lg);\n  line-height: var(--lh-relaxed);\n  color: var(--fg-primary);\n  font-weight: var(--fw-regular);\n}\n.neuralia .caption {\n  font-size: var(--fs-caption);\n  color: var(--fg-muted);\n  letter-spacing: var(--ls-wide);\n}\n.neuralia .overline {\n  font-size: var(--fs-overline);\n  color: var(--fg-accent);\n  text-transform: uppercase;\n  letter-spacing: var(--ls-overline);\n  font-weight: var(--fw-semibold);\n}\n\n.neuralia a {\n  color: var(--fg-accent);\n  text-decoration: underline;\n  text-underline-offset: 3px;\n  text-decoration-thickness: 1px;\n  transition: color var(--duration-fast) var(--ease-out);\n}\n.neuralia a:hover { color: var(--color-deep-violet); }\n\n.neuralia code, .neuralia kbd, .neuralia pre {\n  font-family: var(--font-mono);\n  font-size: 0.9em;\n}\n<\u002Fstyle>\n<style>/* =============================================================================\n   Neuralia TMS — Facebook-ad landing page (focused, booking-first)\n   Built entirely on tokens from colors_and_type.css.\n   ============================================================================= */\n\n*{box-sizing:border-box}\nhtml{scroll-behavior:smooth}\nbody{\n  margin:0;font-family:var(--font-sans);background:var(--color-deep-violet);\n  color:var(--fg-primary);font-size:var(--fs-body);line-height:var(--lh-relaxed);\n  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;\n}\nimg{display:block;max-width:100%}\n::selection{background:var(--color-mind-purple);color:#fff}\n\n.container{max-width:var(--container-wide);margin:0 auto;padding:0 24px}\n\n/* ---------- Buttons (from kit) ------------------------------------------- */\n.btn{\n  display:inline-flex;align-items:center;justify-content:center;gap:8px;border:0;cursor:pointer;\n  text-decoration:none;font-family:var(--fo 15em;margin:0 0 6px}\n.bookpanel__head p{margin:0;color:var(--color-calm-grey);font-size:14.5px}\n.bookpanel__head p strong{color:var(--color-deep-violet);font-weight:700}\n.calendly-inline-widget{min-width:0}\n\n/* =============================================================================\n   Disclaimer + footer (compact)\n   ============================================================================= */\n.disclaimer-bar{background:var(--color-deep-violet);border-top:1px solid rgba(255,255,255,.08)}\n.disclaimer-bar p{max-width:var(--container-base);margin:0 auto;padding:22px 24px;\n  font-size:12.5px;color:rgba(255,255,255,.55);text-align:center;line-height:1.6}\n\n.footer{background:#3D3645;color:rgba(255,255,255,.78);padding:30px 0}\n.footer__inner{max-width:var(--container-wide);margin:0 auto;padding:0 24px;\n  display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap}\n.footer__brand img{height:30px;opacity:.95}\n.footer__links{display:flex;align-items:center;gap:22px;flex-wrap:wrap}\n.footer__links a{display:inline-flex;align-items:center;gap:8px;color:rgba(255,255,255,.82);\n  text-decoration:none;font-size:14px;font-weight:500}\n.footer__links a:hover{color:#fff}\n.footer__links i{color:var(--color-mind-purple);filter:brightness(1.3);width:16px;height:16px}\n.footer__copy{font-size:12px;color:rgba(255,255,255,.45);width:100%;padding-top:6px}\n<\u002Fstyle>\n<script src=\"49fdc38c-ad48-4ad4-81e8-225dc75cad95\"><\u002Fscript>\n<\u002Fhead>\n<body>\n\n<!-- ===================== TOP BAR ===================== -->\n<header class=\"topbar\">\n  <div class=\"topbar__inner\">\n    <a class=\"topbar__logo\" href=\"#\" aria-label=\"Neuralia TMS home\">\n      <img src=\"49336361-c1c5-4dfc-a2a4-6dce67cfcc26\" alt=\"Neuralia TMS\">\n    <\u002Fa>\n    <a class=\"topbar__phone\" href=\"tel:+61862303996\"><i data-lucide=\"phone\"><\u002Fi><span>08 6230 3996<\u002Fspan><\u002Fa>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<!-- ===================== HE
